version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: opsai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: opsai_user
      POSTGRES_PASSWORD: opsai_pass
      POSTGRES_DB: opsai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsai_user -d opsai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opsai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
